<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Customer Form</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="customer-container">

    <div class="top-bar">

      <img
        src="logo.png"
        class="customer-logo"
      >

      <div class="top-buttons">

        <button
          onclick="goDashboard()"
          class="dashboard-btn"
        >
          Dashboard
        </button>

        <button
          onclick="logout()"
          class="logout-btn"
        >
          Sign Out
        </button>

      </div>

    </div>

    <div class="customer-box">

      <h1 class="form-title">
        Customer Form
      </h1>

      <form
        id="customerForm"
        enctype="multipart/form-data"
      >

        <div class="form-grid">

          <div class="input-group">

            <label>
              First Name *
            </label>

            <input
              type="text"
              id="firstName"
              required
            >

          </div>

          <div class="input-group">

            <label>
              Last Name *
            </label>

            <input
              type="text"
              id="lastName"
              required
            >

          </div>

          <div class="input-group">

            <label>
              Email *
            </label>

            <input
              type="email"
              id="email"
              required
            >

          </div>

          <div class="input-group">

            <label>
              Phone *
            </label>

            <input
              type="text"
              id="phone"
              required
            >

          </div>

          <div class="input-group">

            <label>
              City *
            </label>

            <input
              type="text"
              id="city"
              required
            >

          </div>

          <div class="input-group">

            <label>
              Address
            </label>

            <input
              type="text"
              id="address"
            >

          </div>

        </div>

        <div class="input-group">

          <label>
            Notes
          </label>

          <textarea
            id="notes"
            rows="5"
          ></textarea>

        </div>

        <div class="input-group">

          <label>
            Attach Files
          </label>

          <input
            type="file"
            id="files"
            multiple
          >

        </div>

        <button
          type="submit"
          class="save-btn"
        >
          Save Customer
        </button>

      </form>

    </div>

  </div>

  <script>

    function logout(){

      localStorage.removeItem("token");

      window.location.href =
        "login.html";

    }

    function goDashboard(){

      window.location.href =
        "dashboard.html";

    }

    document
      .getElementById("customerForm")
      .addEventListener(
        "submit",
        async (e)=>{

          e.preventDefault();

      const phone =
  document
    .getElementById("phone")
    .value;

const cleanPhone =
  phone.replace(/\D/g,'');

if(cleanPhone.length < 7){

  alert(
    "Phone number is invalid"
  );

  return;

}

          

          const formData =
            new FormData();

          formData.append(
            "firstName",
            document
              .getElementById("firstName")
              .value
          );

          formData.append(
            "lastName",
            document
              .getElementById("lastName")
              .value
          );

          formData.append(
            "email",
            document
              .getElementById("email")
              .value
          );

          formData.append(
            "phone",
            phone
          );

          formData.append(
            "city",
            document
              .getElementById("city")
              .value
          );

          formData.append(
            "address",
            document
              .getElementById("address")
              .value
          );

          formData.append(
            "notes",
            document
              .getElementById("notes")
              .value
          );

          const files =
            document
              .getElementById("files")
              .files;

          for(let i=0; i<files.length; i++){

            formData.append(
              "files",
              files[i]
            );

          }

          const response =
            await fetch("/add-customer", {

  method:"POST",

  headers:{
    Authorization:
      localStorage.getItem("token")
  },

  body:formData

});
          const data =
            await response.json();

          if(data.success){

            alert(
              "Customer Saved"
            );

            document
              .getElementById("customerForm")
              .reset();

          } else {

            alert(
              data.message
            );

          }

        });

  </script>

</body>

</html>
