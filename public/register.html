<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Register</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="auth-container">

    <div class="auth-box">

      <img
        src="logo.png"
        class="logo"
      >

      <h1 class="auth-title">
        Create Account
      </h1>

      <form id="registerForm">

        <div class="input-group">

          <label>
            Username *
          </label>

          <input
            type="text"
            id="username"
            required
          >

        </div>

        <div class="input-group">

          <label>
            Email *
          </label>

          <input
            type="email"
            id="email"
            required
          >

        </div>

        <div class="input-group">

          <label>
            Password *
          </label>

          <input
            type="password"
            id="password"
            required
          >

        </div>

        <button
          type="submit"
          class="auth-btn"
        >
          Create Account
        </button>

      </form>

      <a
        href="login.html"
        class="auth-link"
      >
        Back To Login
      </a>

    </div>

  </div>

  <script>

    document
      .getElementById("registerForm")
      .addEventListener(
        "submit",
        async (e) => {

          e.preventDefault();

          const username =
            document.getElementById("username").value;

          const email =
            document.getElementById("email").value;

          const password =
            document.getElementById("password").value;

          const response =
            await fetch("/register", {

              method: "POST",

              headers: {
                "Content-Type":
                  "application/json"
              },

              body: JSON.stringify({
                username,
                email,
                password
              })

            });

          const data =
            await response.json();

          if (data.success) {

            alert(
              "Account Created Successfully"
            );

            window.location.href =
              "login.html";

          } else {

            alert(
              data.message
            );

          }

        });

  </script>

</body>

</html>
