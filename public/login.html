<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login</title>
<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#ffe600">

<link
  rel="apple-touch-icon"
  href="/icon-192x192.png"
>
  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="auth-container">

    <div class="auth-box">

      <img
        src="logo.png"
        class="logo"
      >

      <h1 class="auth-title">
        Login
      </h1>

      <form id="loginForm">

        <div class="input-group">

          <label>
            Email *
          </label>

          <input
            type="email"
            id="email"
            required
          >

        </div>

        <div class="input-group">

          <label>
            Password *
          </label>

          <input
            type="password"
            id="password"
            required
          >

        </div>

        <button
          type="submit"
          class="auth-btn"
        >
          Login
        </button>

      </form>

      <a
        href="register.html"
        class="auth-link"
      >
        Create Account
      </a>

    </div>

  </div>

  <script>

    document
      .getElementById("loginForm")
      .addEventListener(
        "submit",
        async (e) => {

          e.preventDefault();

          const email =
            document.getElementById("email").value;

          const password =
            document.getElementById("password").value;

          const response =
            await fetch("/login", {

              method: "POST",

              headers: {
                "Content-Type":
                  "application/json"
              },

              body: JSON.stringify({
                email,
                password
              })

            });

          const data =
            await response.json();

          if (data.success) {

            localStorage.setItem(
              "token",
              data.token
            );

            window.location.href =
              "dashboard.html";

          } else {

            alert(
              data.message
            );

          }

        });

  </script>

</body>

</html>
